# Disable modem offload (native_sim use the host network stack directly)
CONFIG_NET_SOCKETS_OFFLOAD=n

# Native network driver
CONFIG_NET_DRIVERS=y
CONFIG_ETH_NATIVE_POSIX=y

# Disable nrf specific options
CONFIG_NRF_MODEM_LIB=n
CONFIG_LTE_LINK_CONTROL=n
CONFIG_MODEM_INFO=n
CONFIG_DK_LIBRARY=n

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.1.1"
